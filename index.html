<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#050b1f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Figs" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="description" content="Acompanhe o álbum oficial da Copa do Mundo FIFA 2026 — 48 seleções, 980 figurinhas, USA · Canadá · México." />
    <meta property="og:title" content="Figs — Cromos da Copa 2026" />
    <meta property="og:description" content="App de bolso pro álbum da Copa 2026. 48 seleções · 980 figurinhas · pacotes, trocas e scan via câmera." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <title>Figs · Copa 2026 · USA · Canadá · México</title>
  </head>
  <body style="background:#050b1f;color:#dde3f2;margin:0;">
    <div id="app">
      <!-- Static fallback. If the JS fails to load (stale SW cache, broken bundle, network)
           the user still sees the wordmark + a way out. The Svelte mount() replaces this. -->
      <div id="boot-fallback" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;font-family:system-ui,-apple-system,sans-serif;text-align:center;">
        <div style="color:#fbbf24;font-size:48px;font-weight:700;letter-spacing:0.04em;line-height:1;">FIGS</div>
        <div style="color:#c1c9e3;font-size:11px;text-transform:uppercase;letter-spacing:0.3em;margin-top:6px;">cromos da copa 2026</div>
        <div id="boot-spinner" style="margin-top:32px;color:#9aa6cf;font-size:13px;">carregando o app...</div>
        <div id="boot-stuck" style="display:none;margin-top:24px;max-width:300px;">
          <p style="color:#ef4444;font-size:13px;font-weight:600;">App não carregou.</p>
          <p style="color:#c1c9e3;font-size:12px;margin-top:8px;line-height:1.5;">
            Provavelmente o cache antigo do navegador. Toca o botão pra limpar e recarregar.
          </p>
          <button id="boot-reset" type="button"
                  style="margin-top:16px;background:#fbbf24;color:#050b1f;border:0;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;">
            limpar cache e recarregar
          </button>
          <p id="boot-reset-status" style="margin-top:12px;color:#9aa6cf;font-size:11px;min-height:14px;"></p>
        </div>
      </div>
    </div>
    <script>
      // INLINE reset — does not depend on any module loading. After 6 seconds
      // without a successful Svelte mount, we show the reset button so the
      // user always has a way out of a stale-SW situation.
      (function() {
        var stuckTimer = setTimeout(function() {
          var s = document.getElementById('boot-spinner');
          var stuck = document.getElementById('boot-stuck');
          if (s) s.style.display = 'none';
          if (stuck) stuck.style.display = 'block';
        }, 6000);
        window.__figsBootDone = function() {
          clearTimeout(stuckTimer);
        };
        var btn = document.getElementById('boot-reset');
        var status = document.getElementById('boot-reset-status');
        if (btn) {
          btn.addEventListener('click', async function() {
            btn.disabled = true;
            status.textContent = 'limpando...';
            try {
              if ('serviceWorker' in navigator) {
                var regs = await navigator.serviceWorker.getRegistrations();
                for (var i = 0; i < regs.length; i++) { try { await regs[i].unregister(); } catch (e) {} }
              }
            } catch (e) {}
            try {
              if ('caches' in window) {
                var keys = await caches.keys();
                for (var i = 0; i < keys.length; i++) { try { await caches.delete(keys[i]); } catch (e) {} }
              }
            } catch (e) {}
            try { localStorage.clear(); } catch (e) {}
            try { sessionStorage.clear(); } catch (e) {}
            status.textContent = 'pronto. recarregando...';
            setTimeout(function() {
              location.replace(location.pathname + '?reset=' + Date.now());
            }, 800);
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
